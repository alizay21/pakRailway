name: Deploy

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json
      - name: Install client
        working-directory: ./client
        run: npm ci
      - name: Build client
        working-directory: ./client
        run: npm run build
      - name: Install server
        working-directory: ./server
        run: npm ci
      - name: Done
        run: echo "Build OK (actual hosting depends on provider)"
